default: &default
  adapter: postgresql
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: 127.0.0.1
  username: postgres
  password: postgres
  port: 5435

test:
  <<: *default
  database: rails_micro_event_sourcing_test

development:
  <<: *default
  database: rails_micro_event_sourcing_development
